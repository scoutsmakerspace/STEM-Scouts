faq:
  - question: "Who are the kits for?"
    answer: >-
      They are mainly intended for Scouts, schools, clubs and community groups that want a practical STEM activity.
      They work best when adults prepare the session properly and manage soldering safety.
  - question: "Can complete beginners build them?"
    answer: >-
      Yes, with supervision. The kits are designed to be approachable, but young people still need a clear safety briefing,
      a sensible workspace and adults who can help with soldering and troubleshooting.
  - question: "Are the kits individually packed?"
    answer: >-
      It depends on the order size and packing option. Smaller orders are usually supplied with PCBs individually bagged and
      other components grouped in labelled bulk bags. Larger orders may use bulk packing unless individual packing is agreed.
  - question: "Why are locations on the map approximate?"
    answer: >-
      To protect privacy. The public map shows broad postcode-district reach only, not full addresses or private order details.
  - question: "What should I do if something is missing?"
    answer: >-
      Check the packing list in the parcel first, then contact the organiser with the kit type, quantity and missing item.
      Do not send private order details through public comments or social media.
  - question: "How are funds used?"
    answer: >-
      The project helps fund practical STEM activities and supports young people learning by making.
      Any surplus from kit batches is used to support community STEM work, equipment, materials and future activities.
